{% extends 'base.html' %}
{% block title %}Edit Profile{% endblock %}
{% block content %}
<div class="container my-4">
  <div class="form-card">
    <h2><i class="bi bi-person-gear"></i> Edit Profile</h2>
    <form method="post">
      {% csrf_token %}
      {% for field in form %}
      <div class="mb-3">
        <label class="form-label">{{ field.label }}</label>
        {{ field }}
        {% for error in field.errors %}<div class="text-danger small mt-1">{{ error }}</div>{% endfor %}
      </div>
      {% endfor %}
      <button type="submit" class="btn btn-primary px-4">Save Profile</button>
      <a href="{% url 'home' %}" class="btn btn-outline-secondary ms-2">Cancel</a>
    </form>
  </div>
</div>
<script>
document.querySelectorAll('input:not([type=checkbox])').forEach(el=>el.classList.add('form-control'));
document.querySelectorAll('select').forEach(el=>el.classList.add('form-select'));
document.querySelectorAll('textarea').forEach(el=>el.classList.add('form-control'));
document.querySelectorAll('input[type=checkbox]').forEach(el=>el.classList.add('form-check-input'));
</script>
{% endblock %}
