{% extends 'base.html' %}
{% block title %}Delete Listing{% endblock %}
{% block content %}
<div class="container my-4">
  <div class="form-card text-center">
    <i class="bi bi-trash text-danger" style="font-size:3rem"></i>
    <h4 class="mt-3">Delete this listing?</h4>
    <p class="text-muted">Are you sure you want to remove <strong>{{ listing.title }}</strong>? This cannot be undone.</p>
    <form method="post" class="d-flex gap-2 justify-content-center">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger px-4">Yes, Delete</button>
      <a href="{% url 'listing_detail' listing.pk %}" class="btn btn-outline-secondary px-4">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
